name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            runner: macos-latest
            dart_arch: arm64
            asset_name: proxima-macos-arm64
            binary: proxima

          - target: linux-x64
            runner: ubuntu-latest
            dart_arch: x64
            asset_name: proxima-linux-x64
            binary: proxima

          - target: windows-x64
            runner: windows-latest
            dart_arch: x64
            asset_name: proxima-windows-x64.exe
            binary: proxima.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
          architecture: ${{ matrix.dart_arch }}

      - name: Install dependencies
        run: dart pub get

      - name: Run tests
        run: dart test

      - name: Compile binary
        run: dart compile exe bin/proxima.dart -o ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.binary }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry
        id: changelog
        run: |
          version="${{ steps.version.outputs.version }}"
          notes=$(awk "/^## \[$version\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          {
            echo "notes<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          mv artifacts/proxima-macos-arm64/proxima      artifacts/proxima-macos-arm64
          mv artifacts/proxima-linux-x64/proxima        artifacts/proxima-linux-x64
          mv artifacts/proxima-windows-x64.exe/proxima.exe artifacts/proxima-windows-x64.exe
          chmod +x artifacts/proxima-macos-arm64 artifacts/proxima-linux-x64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Proxima ${{ github.ref_name }}
          body: |
            ## What's changed

            ${{ steps.changelog.outputs.notes }}

            ---

            ## Installation

            **macOS / Linux — install script**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/jizzel/proxima/main/install.sh | sh
            ```

            **macOS (Apple Silicon + Intel via Rosetta 2)**
            ```bash
            curl -fsSL https://github.com/jizzel/proxima/releases/download/${{ github.ref_name }}/proxima-macos-arm64 \
              -o /usr/local/bin/proxima && chmod +x /usr/local/bin/proxima
            ```

            **Linux (x86_64)**
            ```bash
            curl -fsSL https://github.com/jizzel/proxima/releases/download/${{ github.ref_name }}/proxima-linux-x64 \
              -o /usr/local/bin/proxima && chmod +x /usr/local/bin/proxima
            ```

            **Windows (x86_64) — PowerShell**
            ```powershell
            irm https://raw.githubusercontent.com/jizzel/proxima/main/install.ps1 | iex
            ```
            Or download `proxima-windows-x64.exe` below and add it to a directory on your `PATH`.
          files: |
            artifacts/proxima-macos-arm64
            artifacts/proxima-linux-x64
            artifacts/proxima-windows-x64.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
